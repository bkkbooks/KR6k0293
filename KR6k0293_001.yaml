body:
  text: 釋弘一養正院從開辦到現在已是一年多了外面的名譽很好這因為由瑞金法師主辦又得各位法師熱心愛護所以能有這樣的成績我這次到廈門得來這裏參觀心裏非常歡喜各方面的布置都很完美就是地上也掃得乾乾淨淨的這樣在別的地方很不容易看到我在泉州草庵大病的時候承諸位寫一封信來各人都簽了名慰問我的病狀並且又承諸位念佛七天代我懺悔還有像這樣別的事都使我感激萬分再過幾個月我就要到鼓浪嶼日光巖去方便閉關了時期大約頗長久怕不能時時會到所以特地發心來和諸位敘談敘談今天所要和諸位談的共有四項一是惜福二是習勞三是持戒四是自尊都是青年佛徒應該注意的一惜福惜是愛惜福是福氣就是我們縱有福氣也要加以愛惜切不可把牠浪費諸位要曉得末法時代人的福是很微薄的若不愛惜將這很薄的福享盡了就要受莫大的痛苦古人所説樂極生悲就是這意思阿我記得從前小孩子的時候我父親請人寫了一副大對聯是清朝劉文定公的句子高高地挂在大廳的抱柱上上聯是惜食惜衣非為惜財緣惜福我底哥哥時常教我念這句子我念熟了以後臨到穿衣或是飲食的當兒我都十分注意就是一粒米飯也不敢隨意糟掉而且我母親也常常教我身上所穿的衣服當時時小心不可損壞或污染這因為母親和哥哥怕我不愛惜衣食損失福報以致短命而死所以常常這樣叮囑著諸位可曉得我五歲的時候父親就不在世了七歲我練習寫字拿整張的紙瞎寫一點不知愛惜我母親看到就正顏厲色的説孩子你要知道呀你父親在世時莫説這樣大的整張的紙不肯糟踏就連寸把長的紙條也不肯隨便丟掉哩母親這話也是惜福的意思阿我因為有這樣的家庭教育深深地印在腦裏後來年紀大了也沒一時不愛惜衣食就是出家以後一直到現在也還保守著這樣的習慣諸位請看我腳上穿的一雙黃鞋子還是民國九年在杭州時候一位打念七佛的出家人送給我的又諸位有空可以到我房間裏來看看我的棉被面子還是出家以前所用的又有一把洋傘也是民國初年買的這些東西即使有破爛的地方請人用針線縫縫仍舊同新的一樣了簡直可盡我形壽受用著哩不過我所穿的小衫袴和羅漢草鞋一類的東西卻須五六年一換除此以外一切衣物大都是在家時候或是初出家時候製的從前常有人送我好的衣服或別的珍貴之物但我大半都轉送別人因為我知道我的福薄好的東西是沒有膽量受用的又如喫東西只生病時候喫一些好的除此以外從不敢隨便亂買好的東西喫惜福並不是我一個人的主張就是淨土宗大德印光老法師也是這樣有人送他白木耳等補品他自己總不願意喫轉送到觀宗寺去供養諦間法師別人問他法師你為甚麼不喫好的補品他説我福氣很薄不堪消受他老人家印光法師性情剛直平常對人只問理之當不當情面是不顧的前幾年有一位皈依弟子是鼓浪嶼有名的居士去看望他和他一道喫飯這位居士先喫好老法師見他碗裏剩落了一兩粒米飯於是就很不客氣地大聲呵斥道你有多大福氣可以這樣隨便糟踏飯粒你得把他喫光諸位以上所説的話句句都要牢記要曉得我們即使有十分福氣也只好享受二三分所餘的可以留到以後去享受諸位或者能發大心願以我的福氣布施一切衆生共同享受那更好了二習勞習是練習勞是勞動現在講講習勞的事情諸位請看看自己的身體上有兩手下有兩腳這原為勞動而生的若不將他運用習勞不但有負兩手兩腳就是對於身體也一定有害無益的換句話説若常常勞動身體必定康健而且我們要曉得勞動原是人類本分上的事不惟我們尋常出家人要練習勞動即使到了佛的地位也要常常勞動才行現在我且講講佛的勞動的故事所謂佛就是釋迦牟尼佛在平常人想起來佛在世時總以為同現在的方丈和尚一樣有衣鉢師侍者師常常侍候著佛自己不必做甚麼但是不然有一天佛看到地下不很清潔自己就拿起掃帚來掃地許多大弟子見了也過來幫掃不一時把地掃得十分清潔佛看了歡喜隨即到講堂裏去説法説道若人掃地能得五種功德又有一個時候佛和阿難出外遊行在路上碰到一個喝醉了酒的弟子已醉得不省人事了佛就命阿難抬腳自己抬頭一直抬到井邊用桶汲水叫阿難把他洗濯乾淨有一天佛看到門前木頭做的橫楣壞了自己動手去修補有一次一個弟子生了病沒有人照應佛就問他説你生了病為什麼沒人照應你那弟子説從前人家有病我不曾發心去照應他現在我有病所以人家也不來照應我了佛聽了這話就説人家不來照應你就由我來照應你吧就將那病弟子大小便種種污穢洗濯得乾乾淨淨並且還將他的牀鋪理得清清楚楚然後扶他上牀由此可見佛是怎樣的習勞了佛決不像現在的人凡事都要人家服勞自己坐著享福這些事實出於經律並不是憑空説説的現在我再説兩樁事情給大家聽聽彌陀經中載著的一位大弟子阿䨲樓陀他雙目失明不能料理自己佛就替他裁衣服還叫別的弟子一道幫著做有一次佛看到一位老年比丘眼花了要穿針縫衣無奈眼睛看不清楚嘴裏叫著誰能替我穿針呀佛聽了立刻答應説我來替你穿以上所舉的例都足證明佛是常常勞動的我盼望諸位也當以佛為模範凡事自己動手去做不可依賴別人三持戒持戒二字的意義我想諸位總是明白的吧我們不説修到菩薩或佛的地位就是想來生再做人最低的限度也要能持五戒可惜現在受戒的人雖多只是挂個名而已切切實實能持戒的卻很少要知道受戒之後若不持戒所犯的罪比不受戒的人要加倍的大所以我時常勸人不要隨便受戒至於現在一般傳戒的情形看了真痛心我實在説也不忍説了我想最好還是隨自己的力量去受戒萬不可敷衍門面自尋苦惱戒中最重要的不用説是殺盜淫妄此外還有飲酒食肉也易惹人譏嫌至於喫煙在律中雖無明文但在我國習慣上也很容易受人譏嫌的總以不喫為是四自尊尊是尊重自尊就是自己尊重自己可是人都喜歡人家尊重我而不知我自己尊重自己不知道要想人家尊重自己必須我自己尊重自己做起怎樣尊重自己呢就是自己時時想著我當做一個偉大的人做一個了不起的人比如我們想做一位清淨的高僧吧就拿高僧傳來讀看他們怎樣行我也怎樣行所謂彼既丈夫我亦爾又比方我想將來做一位大菩薩那末就當依經中所載的菩薩行隨力行去這就是自尊但自尊與貢高不同貢高是妄自尊大目空一切的胡亂行為自尊是自己增進自己的德業其中並沒有一絲一毫看不起人的意思的諸位萬萬不可以為自己是一個小孩子是一個小和尚一切不妨隨便些也不可説我是一個平常的出家人那裏敢希望做高僧做大菩薩凡事全在自己做去能有高尚的志向沒有做不到的諸位如果作這樣想我是不敢希望做高僧做大菩薩的那做事就隨隨便便甚至自暴自棄走到墮落的路上去了那不是很危險的麼諸位應當知道年紀雖然小志氣却不可不高阿我還有一句話要向大家説我們現在依佛出家所處的地位是非常尊貴的就以剃髮披袈裟的形式而論也是人天師表國王和諸天人來禮拜我們都可端坐而受你們知道這道理麼自今以後就當尊重自己萬萬不可隨便了以上四項是出家人最當注意的別的我也不多説了我不久就要閉關不能和諸位時常在一塊兒談話這是很抱歉的但我還想在關內講講律每星期約講三四次諸位碰到例假不妨來聽聽今天得和諸位見面我非常高興我只希望諸位把我所講的四項牢記在心作為永久的紀念時間講得久了費諸位的神抱歉抱歉
